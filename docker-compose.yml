version: "3.9"

# ============================================================
# OpsSwarm — Local Development Stack
# ============================================================
# Usage:
#   docker-compose up -d          Start all services
#   docker-compose down           Stop all services
#   docker-compose logs -f        Stream logs
#   docker-compose ps             Check status
# ============================================================

services:

  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: opsswarm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: opsswarm
      POSTGRES_USER: opsswarm_user
      POSTGRES_PASSWORD: opsswarm_dev_password
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opsswarm_user -d opsswarm"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - opsswarm-net

  # ── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: opsswarm-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - opsswarm-net

  # ── Qdrant ──────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: opsswarm-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # HTTP REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__LOG_LEVEL: INFO
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - opsswarm-net

  # ── pgAdmin (Dev UI for PostgreSQL) ─────────────────────────
  pgadmin:
    image: dpage/pgadmin4:8
    container_name: opsswarm-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@opsswarm.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - opsswarm-net
    profiles:
      - devtools   # Only starts with: docker-compose --profile devtools up

  # ── Redis Commander (Dev UI for Redis) ──────────────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: opsswarm-redis-ui
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - opsswarm-net
    profiles:
      - devtools   # Only starts with: docker-compose --profile devtools up

# ── Networks ────────────────────────────────────────────────
networks:
  opsswarm-net:
    driver: bridge
    name: opsswarm-network

# ── Volumes ─────────────────────────────────────────────────
volumes:
  postgres_data:
    name: opsswarm-postgres-data
  redis_data:
    name: opsswarm-redis-data
  qdrant_data:
    name: opsswarm-qdrant-data
